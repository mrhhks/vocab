<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>背單字 AI 字卡</title>
  <style>
    :root{
      --blue:#1677ff;
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#1f2937;
      --sub:#6b7280;
      --border:#dbe3ef;
      --danger:#ef4444;
      --success:#10b981;
      --grayBtn:#eef3fb;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      max-width:560px;
      margin:0 auto;
      min-height:100vh;
      padding-bottom:32px;
    }

    .topbar{
      background:var(--blue);
      color:#fff;
      padding:24px 16px 22px;
      text-align:center;
      font-size:24px;
      font-weight:800;
      position:sticky;
      top:0;
      z-index:10;
      border-bottom-left-radius:26px;
      border-bottom-right-radius:26px;
      box-shadow:0 10px 24px rgba(22,119,255,.18);
    }

    .subline{
      font-size:13px;
      opacity:.92;
      margin-top:6px;
      font-weight:600;
    }

    .section{
      padding:16px;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:14px 16px;
      background:var(--blue);
      color:#fff;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
    }

    .btn.secondary{
      background:#fff;
      color:var(--blue);
      border:1.5px solid var(--blue);
    }

    .btn.gray{
      background:var(--grayBtn);
      color:#1f2937;
      border:1px solid var(--border);
    }

    .btn.danger{
      background:var(--danger);
    }

    .btn.small{
      padding:10px 12px;
      font-size:14px;
      border-radius:12px;
    }

    .card-box{
      background:var(--card);
      border-radius:22px;
      padding:16px;
      box-shadow:0 12px 26px rgba(16,24,40,.08);
      border:1px solid #eef2f8;
      margin-top:14px;
    }

    .title{
      font-size:22px;
      font-weight:900;
      margin:0 0 14px;
    }

    .label{
      font-size:14px;
      font-weight:800;
      margin:12px 0 6px;
      color:#334155;
    }

    input, select, textarea{
      width:100%;
      padding:13px 14px;
      border-radius:14px;
      border:1.4px solid var(--border);
      background:#fff;
      font-size:16px;
      outline:none;
    }

    textarea{
      min-height:96px;
      resize:vertical;
    }

    .row{
      display:flex;
      gap:10px;
    }

    .row > *{
      flex:1;
    }

    .hint-text{
      color:var(--sub);
      font-size:13px;
      margin-top:8px;
      line-height:1.55;
    }

    .hidden{
      display:none !important;
    }

    .flashcard{
      min-height:260px;
      background:linear-gradient(180deg,#ffffff,#f9fbff);
      border-radius:24px;
      border:1px solid var(--border);
      padding:22px 20px 42px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:28px;
      line-height:1.55;
      font-weight:800;
      position:relative;
      white-space:pre-wrap;
      word-break:break-word;
      transition: transform .28s ease, opacity .28s ease, box-shadow .28s ease;
      touch-action: pan-y;
      user-select:none;
      -webkit-user-select:none;
    }

    .flashcard.dragging{
      transition:none;
    }

    .flashcard.swipe-left{
      transform: translateX(-140px) rotate(-10deg);
      opacity:0;
    }

    .flashcard.swipe-right{
      transform: translateX(140px) rotate(10deg);
      opacity:0;
    }

    .flashcard.flip-animate{
      animation:flipPulse .35s ease;
    }

    @keyframes flipPulse{
      0%{ transform:rotateY(0deg) scale(1); }
      50%{ transform:rotateY(90deg) scale(.97); }
      100%{ transform:rotateY(0deg) scale(1); }
    }

    .flashcard .corner{
      position:absolute;
      right:14px;
      bottom:12px;
      font-size:14px;
      color:var(--sub);
      font-weight:800;
    }

    .flashcard .badge{
      position:absolute;
      left:14px;
      top:12px;
      font-size:12px;
      color:var(--blue);
      background:#eaf2ff;
      padding:6px 10px;
      border-radius:999px;
      font-weight:900;
    }

    .study-controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .study-meta{
      margin-top:12px;
      color:var(--sub);
      font-size:14px;
      text-align:center;
      line-height:1.5;
    }

    .list-tools{
      display:grid;
      gap:10px;
    }

    .filter-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .library-item{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      margin-top:12px;
    }

    .library-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }

    .chip{
      display:inline-block;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      background:#eff6ff;
      color:var(--blue);
      font-weight:900;
    }

    .front-back{
      line-height:1.6;
      font-size:16px;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .empty{
      text-align:center;
      color:var(--sub);
      padding:18px 8px;
      font-size:15px;
      line-height:1.6;
    }

    .toast{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:24px;
      background:#111827;
      color:#fff;
      padding:12px 16px;
      border-radius:999px;
      font-size:14px;
      z-index:30;
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
    }

    .toast.show{
      opacity:1;
    }

    .quiz-input{
      margin-top:12px;
    }

    .quiz-feedback{
      min-height:24px;
      margin-top:10px;
      font-size:14px;
      line-height:1.5;
    }

    .ok{
      color:var(--success);
      font-weight:800;
    }

    .bad{
      color:var(--danger);
      font-weight:800;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      背單字 AI 字卡
      <div class="subline">手機版網頁 App</div>
    </div>

    <div class="section">
      <div class="menu-grid">
        <button class="btn" onclick="showPage('home')">首頁</button>
        <button class="btn" onclick="showPage('add')">新增字卡</button>
        <button class="btn" onclick="showPage('study')">開始背卡</button>
        <button class="btn" onclick="showPage('library')">字卡庫</button>
        <button class="btn" onclick="showPage('quiz')">測驗模式</button>
        <button class="btn" onclick="showPage('wrong')">錯題集</button>
      </div>

      <div id="homePage" class="card-box">
        <div class="title">功能總覽</div>
        <div class="hint-text">
          這版支援：
          <br>1. 自訂字卡
          <br>2. AI 句子字卡
          <br>3. AI 近義 / 反義字卡
          <br>4. 背卡滑動練習
          <br>5. 測驗模式
          <br>6. 錯題集
        </div>
      </div>

      <div id="addPage" class="card-box hidden">
        <div class="title">新增字卡</div>

        <div class="label">字卡類型</div>
        <select id="cardType" onchange="toggleFormByType()">
          <option value="custom">自訂字卡</option>
          <option value="ai_sentence">AI 句子字卡</option>
          <option value="ai_syn_ant">AI 近反義詞字卡</option>
        </select>

        <div id="customFields">
          <div class="label">正面內容</div>
          <textarea id="customFront" placeholder="例如：勤奮的"></textarea>

          <div class="label">背面內容</div>
          <input id="customBack" placeholder="例如：diligent" />
        </div>

        <div id="sentenceFields" class="hidden">
          <div class="label">輸入單字</div>
          <input id="sentenceWord" placeholder="例如：maintain" />
          <div class="hint-text">背面會是單字，正面會自動生成較合理的挖空句，只保留字首。</div>
        </div>

        <div id="synFields" class="hidden">
          <div class="label">輸入單字</div>
          <input id="synWord" placeholder="例如：rapid" />

          <div class="label">顯示模式</div>
          <select id="synMode">
            <option value="both">近義 + 反義</option>
            <option value="synonym">只要近義詞</option>
            <option value="antonym">只要反義詞</option>
          </select>
          <div class="hint-text">正面會顯示近義詞 / 反義詞，並標註類型。</div>
        </div>

        <div class="row" style="margin-top:14px;">
          <button class="btn" onclick="createCard()">建立字卡</button>
          <button class="btn secondary" onclick="clearAddForm()">清空</button>
        </div>
      </div>

      <div id="studyPage" class="card-box hidden">
        <div class="title">開始背卡</div>
        <div id="studyArea"></div>
      </div>

      <div id="libraryPage" class="card-box hidden">
        <div class="title">字卡庫</div>

        <div class="list-tools">
          <input id="searchInput" placeholder="搜尋正面、背面內容" oninput="renderLibrary()" />
          <div class="filter-row">
            <select id="filterType" onchange="renderLibrary()">
              <option value="all">全部類型</option>
              <option value="custom">自訂字卡</option>
              <option value="ai_sentence">AI 句子字卡</option>
              <option value="ai_syn_ant">AI 近反義詞字卡</option>
            </select>
            <button class="btn gray small" onclick="clearAllCards()">清空全部字卡</button>
          </div>
        </div>

        <div id="libraryList"></div>
      </div>

      <div id="quizPage" class="card-box hidden">
        <div class="title">測驗模式</div>
        <div id="quizArea"></div>
      </div>

      <div id="wrongPage" class="card-box hidden">
        <div class="title">錯題集</div>
        <div id="wrongList"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = "ai_vocab_flashcards_v3";
    const WRONG_KEY = "wrong_book_v1";

    let cards = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    let wrongBook = JSON.parse(localStorage.getItem(WRONG_KEY) || "[]");

    let currentStudyIndex = 0;
    let currentFlipped = false;
    let studyDeck = [];

    let quizDeck = [];
    let currentQuizIndex = 0;

    const sentenceBank = {
      apple: [
        "An a____ a day may keep the doctor away.",
        "She ate an a____ after lunch.",
        "The boy picked a red a____ from the tree."
      ],
      maintain: [
        "We need to m_______ this system carefully.",
        "It is important to m_______ a healthy lifestyle.",
        "She works hard to m_______ good relationships with others."
      ],
      rapid: [
        "There was a r____ increase in population.",
        "The patient showed r____ improvement after treatment.",
        "Technology has gone through r____ change in recent years."
      ],
      diligent: [
        "She is very d_______ in her studies.",
        "The teacher praised him for being d_______ and responsible.",
        "A d_______ student reviews lessons every day."
      ],
      hesitate: [
        "Do not h_______ to ask for help.",
        "She seemed to h_______ before answering the question.",
        "He did not h_______ to speak up."
      ],
      achieve: [
        "She worked hard to a_______ her goal.",
        "You can a_______ success through practice.",
        "They hope to a_______ better results this year."
      ],
      apparent: [
        "It became a_______ that he was upset.",
        "The difference was immediately a_______.",
        "Her disappointment was a_______ from her expression."
      ],
      genuine: [
        "She gave me a g_______ smile.",
        "His concern for others was g_______ and sincere.",
        "This museum displays a g_______ ancient artifact."
      ],
      defend: [
        "Soldiers must d______ their country.",
        "He spoke up to d______ his opinion.",
        "The lawyer tried to d______ her client in court."
      ],
      condemn: [
        "Many people c______ violence strongly.",
        "The judge c______ the unfair action.",
        "Leaders should c______ corruption."
      ],
      scatter: [
        "The wind began to s______ the leaves.",
        "The children s______ across the playground.",
        "Do not s______ your books all over the floor."
      ]
    };

    const aiWordData = {
      rapid: {
        synonyms: ["quick", "fast", "swift"],
        antonyms: ["slow", "gradual", "sluggish"]
      },
      diligent: {
        synonyms: ["hardworking", "industrious", "studious"],
        antonyms: ["lazy", "idle", "careless"]
      },
      maintain: {
        synonyms: ["preserve", "sustain", "keep"],
        antonyms: ["neglect", "abandon", "disrupt"]
      },
      hesitate: {
        synonyms: ["pause", "waver", "doubt"],
        antonyms: ["decide", "act", "proceed"]
      },
      achieve: {
        synonyms: ["accomplish", "attain", "complete"],
        antonyms: ["fail", "lose", "miss"]
      },
      apparent: {
        synonyms: ["obvious", "clear", "evident"],
        antonyms: ["hidden", "unclear", "obscure"]
      },
      genuine: {
        synonyms: ["real", "authentic", "sincere"],
        antonyms: ["fake", "false", "artificial"]
      },
      defend: {
        synonyms: ["protect", "guard", "support"],
        antonyms: ["attack", "harm", "abandon"]
      },
      condemn: {
        synonyms: ["criticize", "denounce", "blame"],
        antonyms: ["praise", "approve", "support"]
      },
      scatter: {
        synonyms: ["spread", "disperse", "splash"],
        antonyms: ["gather", "collect", "assemble"]
      }
    };

    function saveCards(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    function saveWrongBook(){
      localStorage.setItem(WRONG_KEY, JSON.stringify(wrongBook));
    }

    function showToast(message){
      const t = document.getElementById("toast");
      t.textContent = message;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1600);
    }

    function showPage(page){
      document.getElementById("homePage").classList.add("hidden");
      document.getElementById("addPage").classList.add("hidden");
      document.getElementById("studyPage").classList.add("hidden");
      document.getElementById("libraryPage").classList.add("hidden");
      document.getElementById("quizPage").classList.add("hidden");
      document.getElementById("wrongPage").classList.add("hidden");

      if(page === "home"){
        document.getElementById("homePage").classList.remove("hidden");
      }

      if(page === "add"){
        document.getElementById("addPage").classList.remove("hidden");
      }

      if(page === "study"){
        document.getElementById("studyPage").classList.remove("hidden");
        studyDeck = [...cards];
        currentStudyIndex = 0;
        currentFlipped = false;
        renderStudyCard();
      }

      if(page === "library"){
        document.getElementById("libraryPage").classList.remove("hidden");
        renderLibrary();
      }

      if(page === "quiz"){
        document.getElementById("quizPage").classList.remove("hidden");
        startQuiz();
      }

      if(page === "wrong"){
        document.getElementById("wrongPage").classList.remove("hidden");
        renderWrongBook();
      }
    }

    function toggleFormByType(){
      const type = document.getElementById("cardType").value;
      document.getElementById("customFields").classList.add("hidden");
      document.getElementById("sentenceFields").classList.add("hidden");
      document.getElementById("synFields").classList.add("hidden");

      if(type === "custom") document.getElementById("customFields").classList.remove("hidden");
      if(type === "ai_sentence") document.getElementById("sentenceFields").classList.remove("hidden");
      if(type === "ai_syn_ant") document.getElementById("synFields").classList.remove("hidden");
    }

    function normalizeWord(word){
      return (word || "").trim();
    }

    function makeBlankWord(word){
      if(!word) return "";
      if(word.length === 1) return word[0];
      return word[0] + "_".repeat(word.length - 1);
    }

    function fallbackWordSet(word){
      const first = word[0]?.toLowerCase() || "a";
      return {
        synonyms: [`${first}lternative`, `${first}similar`, `${first}related`],
        antonyms: [`not-${word}`, `opposite-${word}`, `anti-${word}`]
      };
    }

    function generateSentenceCard(word){
      const clean = normalizeWord(word).toLowerCase();
      const options = sentenceBank[clean];

      let maskedSentence = "";
      if (options && options.length > 0) {
        maskedSentence = options[Math.floor(Math.random() * options.length)];
      } else {
        const blank = makeBlankWord(clean);
        maskedSentence = `This word starts with ${clean[0]}: ${blank}`;
      }

      return {
        id: Date.now() + Math.random(),
        type: "ai_sentence",
        frontContent: maskedSentence,
        backContent: clean,
        hintLetter: clean[0] || "",
        createdAt: new Date().toISOString(),
        mastery: 0,
        wrongCount: 0
      };
    }

    function generateSynAntCard(word, mode){
      const clean = normalizeWord(word).toLowerCase();
      const data = aiWordData[clean] || fallbackWordSet(clean);

      let lines = [];
      if(mode === "both" || mode === "synonym"){
        data.synonyms.forEach(w => lines.push(`${w} (近義)`));
      }
      if(mode === "both" || mode === "antonym"){
        data.antonyms.forEach(w => lines.push(`${w} (反義)`));
      }

      return {
        id: Date.now() + Math.random(),
        type: "ai_syn_ant",
        frontContent: lines.join("\n"),
        backContent: clean,
        hintLetter: clean[0] || "",
        createdAt: new Date().toISOString(),
        mastery: 0,
        wrongCount: 0
      };
    }

    function createCard(){
      const type = document.getElementById("cardType").value;
      let newCard = null;

      if(type === "custom"){
        const front = document.getElementById("customFront").value.trim();
        const back = document.getElementById("customBack").value.trim();

        if(!front || !back){
          showToast("請完整輸入正面和背面");
          return;
        }

        newCard = {
          id: Date.now() + Math.random(),
          type: "custom",
          frontContent: front,
          backContent: back,
          hintLetter: back[0]?.toLowerCase() || "",
          createdAt: new Date().toISOString(),
          mastery: 0,
          wrongCount: 0
        };
      }

      if(type === "ai_sentence"){
        const word = document.getElementById("sentenceWord").value.trim();
        if(!word){
          showToast("請輸入單字");
          return;
        }
        newCard = generateSentenceCard(word);
      }

      if(type === "ai_syn_ant"){
        const word = document.getElementById("synWord").value.trim();
        const mode = document.getElementById("synMode").value;
        if(!word){
          showToast("請輸入單字");
          return;
        }
        newCard = generateSynAntCard(word, mode);
      }

      cards.unshift(newCard);
      saveCards();
      clearAddForm();
      renderLibrary();
      showToast("字卡建立成功");
    }

    function clearAddForm(){
      document.getElementById("customFront").value = "";
      document.getElementById("customBack").value = "";
      document.getElementById("sentenceWord").value = "";
      document.getElementById("synWord").value = "";
      document.getElementById("synMode").value = "both";
    }

    function typeLabel(type){
      if(type === "custom") return "自訂字卡";
      if(type === "ai_sentence") return "AI 句子";
      if(type === "ai_syn_ant") return "AI 近反義";
      return type;
    }

    function renderStudyCard(){
      const area = document.getElementById("studyArea");

      if(studyDeck.length === 0){
        area.innerHTML = `<div class="empty">本輪背卡完成。</div>`;
        return;
      }

      if(currentStudyIndex >= studyDeck.length) currentStudyIndex = 0;
      const card = studyDeck[currentStudyIndex];
      const showText = currentFlipped ? card.backContent : card.frontContent;

      area.innerHTML = `
        <div id="studyCard" class="flashcard" onclick="flipStudyCard()">
          <div class="badge">${typeLabel(card.type)}</div>
          ${escapeHtml(showText)}
          <div class="corner">字首：${card.hintLetter || "-"}</div>
        </div>

        <div class="study-controls">
          <button class="btn secondary" onclick="markKnown()">左滑：會了</button>
          <button class="btn" onclick="markUnknown()">右滑：不會</button>
        </div>

        <div class="study-controls">
          <button class="btn gray" onclick="prevCard()">上一張</button>
          <button class="btn gray" onclick="flipStudyCard()">翻面</button>
        </div>

        <div class="study-meta">
          第 ${currentStudyIndex + 1} / ${studyDeck.length} 張　
          目前顯示：${currentFlipped ? "背面" : "正面"}
          <br>左滑代表會了，右滑代表不會
        </div>
      `;

      attachSwipeEvents();
    }

    function flipStudyCard(){
      if(studyDeck.length === 0) return;
      currentFlipped = !currentFlipped;
      const el = document.getElementById("studyCard");
      if(el){
        el.classList.remove("flip-animate");
        void el.offsetWidth;
        el.classList.add("flip-animate");
      }
      setTimeout(() => renderStudyCard(), 120);
    }

    function prevCard(){
      if(studyDeck.length === 0) return;
      currentStudyIndex = (currentStudyIndex - 1 + studyDeck.length) % studyDeck.length;
      currentFlipped = false;
      renderStudyCard();
    }

    function attachSwipeEvents(){
      const el = document.getElementById("studyCard");
      if(!el) return;

      let startX = 0;
      let currentX = 0;
      let dragging = false;

      el.ontouchstart = (e) => {
        startX = e.touches[0].clientX;
        dragging = true;
        el.classList.add("dragging");
      };

      el.ontouchmove = (e) => {
        if(!dragging) return;
        currentX = e.touches[0].clientX - startX;
        el.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`;
      };

      el.ontouchend = () => {
        dragging = false;
        el.classList.remove("dragging");

        if(currentX < -80){
          el.classList.add("swipe-left");
          setTimeout(() => markKnown(true), 220);
        } else if(currentX > 80){
          el.classList.add("swipe-right");
          setTimeout(() => markUnknown(true), 220);
        } else {
          el.style.transform = "";
        }
        currentX = 0;
      };
    }

    function markKnown(){
      if(studyDeck.length === 0) return;

      const card = studyDeck[currentStudyIndex];
      card.mastery = (card.mastery || 0) + 1;

      const original = cards.find(c => String(c.id) === String(card.id));
      if(original){
        original.mastery = (original.mastery || 0) + 1;
        saveCards();
      }

      studyDeck.splice(currentStudyIndex, 1);

      if(studyDeck.length === 0){
        document.getElementById("studyArea").innerHTML = `<div class="empty">本輪背卡完成。</div>`;
        return;
      }

      if(currentStudyIndex >= studyDeck.length) currentStudyIndex = 0;
      currentFlipped = false;
      renderStudyCard();
    }

    function markUnknown(){
      if(studyDeck.length === 0) return;

      const card = studyDeck[currentStudyIndex];
      card.wrongCount = (card.wrongCount || 0) + 1;

      const original = cards.find(c => String(c.id) === String(card.id));
      if(original){
        original.wrongCount = (original.wrongCount || 0) + 1;
        saveCards();
      }

      studyDeck.splice(currentStudyIndex, 1);

      let insertIndex = Math.floor(Math.random() * (studyDeck.length + 1));
      if(insertIndex < 1) insertIndex = 1;
      studyDeck.splice(insertIndex, 0, card);

      currentFlipped = false;
      renderStudyCard();
    }

    function renderLibrary(){
      const keyword = document.getElementById("searchInput")?.value.trim().toLowerCase() || "";
      const filterType = document.getElementById("filterType")?.value || "all";
      const list = document.getElementById("libraryList");

      let filtered = cards.filter(card => {
        const matchKeyword = !keyword ||
          card.frontContent.toLowerCase().includes(keyword) ||
          card.backContent.toLowerCase().includes(keyword);

        const matchType = filterType === "all" || card.type === filterType;
        return matchKeyword && matchType;
      });

      if(filtered.length === 0){
        list.innerHTML = `<div class="empty">找不到符合條件的字卡。</div>`;
        return;
      }

      list.innerHTML = filtered.map(card => `
        <div class="library-item">
          <div class="library-top">
            <span class="chip">${typeLabel(card.type)}</span>
            <button class="btn danger small" onclick="deleteCard('${card.id}')">刪除</button>
          </div>
          <div class="front-back"><strong>正面：</strong>${escapeHtml(card.frontContent)}</div>
          <div class="front-back" style="margin-top:6px;"><strong>背面：</strong>${escapeHtml(card.backContent)}</div>
          <div class="hint-text" style="margin-top:8px;">
            字首提示：${escapeHtml(card.hintLetter || "-")}
            <br>會了次數：${card.mastery || 0}　不會次數：${card.wrongCount || 0}
          </div>
        </div>
      `).join("");
    }

    function deleteCard(id){
      cards = cards.filter(card => String(card.id) !== String(id));
      saveCards();
      if(currentStudyIndex >= cards.length) currentStudyIndex = 0;
      renderLibrary();
      showToast("已刪除字卡");
    }

    function clearAllCards(){
      if(!confirm("確定要清空全部字卡嗎？")) return;
      cards = [];
      saveCards();
      studyDeck = [];
      currentStudyIndex = 0;
      currentFlipped = false;
      renderLibrary();
      renderStudyCard();
      showToast("已清空全部字卡");
    }

    function startQuiz(){
      const area = document.getElementById("quizArea");

      if(cards.length === 0){
        area.innerHTML = `<div class="empty">目前沒有字卡可以測驗。</div>`;
        return;
      }

      quizDeck = [...cards];
      currentQuizIndex = 0;
      renderQuizQuestion();
    }

    function renderQuizQuestion(){
      const area = document.getElementById("quizArea");

      if(currentQuizIndex >= quizDeck.length){
        area.innerHTML = `<div class="empty">測驗完成。</div>`;
        return;
      }

      const card = quizDeck[currentQuizIndex];

      area.innerHTML = `
        <div class="flashcard" style="min-height:190px; font-size:24px;">
          ${escapeHtml(card.frontContent)}
          <div class="corner">第 ${currentQuizIndex + 1} / ${quizDeck.length} 題</div>
        </div>

        <div class="label">請輸入背面答案</div>
        <input id="quizAnswer" class="quiz-input" placeholder="輸入答案" />

        <div class="study-controls">
          <button class="btn" onclick="submitQuizAnswer()">送出答案</button>
          <button class="btn secondary" onclick="showQuizAnswer()">看答案</button>
        </div>

        <div id="quizFeedback" class="quiz-feedback"></div>
      `;
    }

    function submitQuizAnswer(){
      const card = quizDeck[currentQuizIndex];
      const input = document.getElementById("quizAnswer").value.trim().toLowerCase();
      const answer = card.backContent.trim().toLowerCase();
      const feedback = document.getElementById("quizFeedback");

      if(input === answer){
        feedback.innerHTML = `<span class="ok">答對了</span>`;
      } else {
        feedback.innerHTML = `<span class="bad">答錯了，正確答案是：${escapeHtml(card.backContent)}</span>`;
        collectWrongAnswer(card, input);
      }

      setTimeout(() => {
        currentQuizIndex++;
        renderQuizQuestion();
      }, 900);
    }

    function showQuizAnswer(){
      const card = quizDeck[currentQuizIndex];
      const feedback = document.getElementById("quizFeedback");
      feedback.innerHTML = `正確答案：${escapeHtml(card.backContent)}`;
    }

    function collectWrongAnswer(card, userAnswer){
      const exists = wrongBook.find(item => String(item.id) === String(card.id));

      if(exists){
        exists.wrongTimes = (exists.wrongTimes || 1) + 1;
        exists.lastUserAnswer = userAnswer;
      } else {
        wrongBook.unshift({
          ...card,
          wrongTimes: 1,
          lastUserAnswer: userAnswer
        });
      }

      saveWrongBook();
    }

    function renderWrongBook(){
      const box = document.getElementById("wrongList");

      if(wrongBook.length === 0){
        box.innerHTML = `<div class="empty">目前沒有錯題。</div>`;
        return;
      }

      box.innerHTML = wrongBook.map(item => `
        <div class="library-item">
          <div class="library-top">
            <span class="chip">錯 ${item.wrongTimes} 次</span>
            <button class="btn danger small" onclick="removeWrongItem('${item.id}')">刪除</button>
          </div>
          <div class="front-back"><strong>正面：</strong>${escapeHtml(item.frontContent)}</div>
          <div class="front-back" style="margin-top:6px;"><strong>正解：</strong>${escapeHtml(item.backContent)}</div>
          <div class="hint-text" style="margin-top:8px;">
            上次你的答案：${escapeHtml(item.lastUserAnswer || "-")}
          </div>
        </div>
      `).join("");
    }

    function removeWrongItem(id){
      wrongBook = wrongBook.filter(item => String(item.id) !== String(id));
      saveWrongBook();
      renderWrongBook();
    }

    function escapeHtml(text){
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;")
        .replaceAll("\n", "<br>");
    }

    toggleFormByType();
    showPage("home");
  </script>
</body>
</html>
